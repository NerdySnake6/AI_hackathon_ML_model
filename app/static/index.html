<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediascope | ML Query NLP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="background-mesh"></div>

    <main class="search-container">
        <!-- Logo / Title -->
        <div class="brand">
            <h1 class="logo-text">Mediascope <span>AI</span></h1>
            <p class="subtitle">Интеллектуальная разметка видеоконтента</p>
        </div>

        <!-- Search Input -->
        <div class="search-wrapper">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input 
                type="text" 
                id="queryInput" 
                class="search-input" 
                placeholder="Введите типичный поисковый запрос (например: 1 сезон тьмы)"
                autocomplete="off"
            >
            <div id="loader" class="loader hidden"></div>
        </div>

        <!-- Empty State Hint -->
        <div id="emptyState" class="empty-state">
            <p>Начните печатать, и алгоритм мгновенно проанализирует домен запроса.</p>
        </div>

        <!-- Results Card (Glassmorphism) -->
        <div id="resultCard" class="result-card hidden">
            <!-- Header Section -->
            <div class="card-header">
                <div class="status-indicator">
                    <div id="statusIcon" class="icon-box"></div>
                    <div class="status-text">
                        <span class="label">DETECTED DOMAIN</span>
                        <h2 id="domainTitle">Video Content</h2>
                    </div>
                </div>
                
                <div class="confidence-box">
                    <span class="label">CONFIDENCE</span>
                    <div class="confidence-value" id="confidenceValue">95%</div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="confidenceBar"></div>
                    </div>
                </div>
            </div>

            <div class="divider"></div>

            <!-- Detailed Metrics -->
            <div class="card-body">
                <div class="metric-group">
                    <span class="label">CONTENT TYPE</span>
                    <p id="contentType" class="value-text">-</p>
                </div>
                <div class="metric-group">
                    <span class="label">EXTRACTED ENTITY</span>
                    <p id="extractedTitle" class="value-text">-</p>
                </div>
                <div class="metric-group">
                    <span class="label">ALGORITHM DECISION</span>
                    <p id="pipelineDecision" class="value-text">-</p>
                </div>
            </div>

            <!-- Underlying Reasons (Tags) -->
            <div class="card-footer" id="reasonsContainer">
                <!-- Tags will be injected here via JS -->
            </div>
        </div>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
